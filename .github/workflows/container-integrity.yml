name: Container Integrity

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  backend-container:
    name: Backend Container Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: rateengine-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Test Backend
        run: |
          docker run -d --name backend-smoke \
            -e PORT=8080 \
            -e DJANGO_SECRET_KEY=ci-smoke-test-only-not-for-production-12345678901234567890 \
            -e ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0 \
            -e DATABASE_URL=postgres://user:pass@localhost:5432/db \
            -e DJANGO_DEBUG=False \
            -p 8080:8080 rateengine-backend:test
          
          # Wait for it to initialize
          sleep 15
          
          # Check if it's still running
          if ! docker ps | grep backend-smoke; then
            echo "Error: Backend container exited prematurely."
            docker logs backend-smoke
            docker inspect backend-smoke | grep ExitCode
            exit 1
          fi
          
          # Verify specific logs
          echo "Verifying logs..."
          docker logs backend-smoke
          docker logs backend-smoke | grep "Binding Gunicorn to port 8080"
          docker logs backend-smoke | grep "Skipping startup migrations"
          
          docker stop backend-smoke
          docker rm backend-smoke

  frontend-container:
    name: Frontend Container Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: rateengine-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Test Frontend
        run: |
          docker run -d --name frontend-smoke -e PORT=8080 -p 8080:8080 rateengine-frontend:test
          sleep 10
          docker ps | grep frontend-smoke
          # Next.js standalone output doesn't log port binding in the same way gunicorn does, 
          # but successful 'docker ps' after 10s is a strong signal for the standalone node server.
          docker stop frontend-smoke
          docker rm frontend-smoke
