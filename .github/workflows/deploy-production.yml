name: Deploy Production (Cloud Run)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for deployment'
        required: true
        default: 'Production update'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.CLOUD_RUN_REGION }}
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
  BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE_NAME }}
  FRONTEND_SERVICE: ${{ secrets.FRONTEND_SERVICE_NAME }}
  MIGRATION_JOB: ${{ secrets.MIGRATION_JOB_NAME }}
  INSTANCE_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_INSTANCE_NAME }}

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/rateengine/backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            latest

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  migrate:
    name: Run Migrations
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Update Migration Job
        run: |
          gcloud run jobs update ${{ env.MIGRATION_JOB }} \
            --image ${{ needs.build-backend.outputs.image }} \
            --region ${{ env.REGION }} \
            --quiet

      - name: Execute Migration Job
        run: |
          gcloud run jobs execute ${{ env.MIGRATION_JOB }} \
            --region ${{ env.REGION }} \
            --wait \
            --quiet

  deploy-backend:
    name: Deploy Backend
    needs: [build-backend, migrate]
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ needs.build-backend.outputs.image }}
          flags: |
            --add-cloudsql-instances=${{ env.INSTANCE_CONNECTION_NAME }}
            --set-env-vars=INSTANCE_CONNECTION_NAME=${{ env.INSTANCE_CONNECTION_NAME }},DJANGO_DEBUG=False
            --liveness-probe-path=/api/health/liveness/
            --startup-probe-path=/api/health/readiness/
    outputs:
      url: ${{ steps.deploy.outputs.url }}

  build-frontend:
    name: Build & Push Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/rateengine/frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            latest

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ needs.deploy-backend.outputs.url }}

  deploy-frontend:
    name: Deploy Frontend
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ needs.build-frontend.outputs.image }}
          flags: |
            --set-env-vars=NEXT_PUBLIC_API_BASE_URL=${{ needs.deploy-backend.outputs.url }},NEXT_PUBLIC_BACKEND_HOSTNAME=${{ needs.deploy-backend.outputs.url }}
            --liveness-probe-path=/
            --startup-probe-path=/
