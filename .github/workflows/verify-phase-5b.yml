name: Verify Phase 5B - Docker Hardening

on:
  push:
    branches:
      - feature/cloud-run-docker-hardening-phase-5b
  pull_request:
    branches:
      - main

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Backend Image
        run: |
          docker build -t rateengine-backend:test ./backend
          
      - name: Verify Backend Container Startup
        run: |
          # Start container in background on port 8080
          docker run -d --name backend-test -e PORT=8080 -p 8080:8080 rateengine-backend:test
          # Wait for it to initialize
          sleep 10
          # Check if it's running
          docker ps | grep backend-test
          # Check logs for binding info
          docker logs backend-test | grep "Binding Gunicorn to port 8080"
          # Check that it didn't try to migrate
          docker logs backend-test | grep "Skipping startup migrations"
          # Stop and cleanup
          docker stop backend-test
          docker rm backend-test

  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Frontend Image
        run: |
          docker build -t rateengine-frontend:test ./frontend
          
      - name: Verify Frontend Container Startup
        run: |
          # Start container in background on port 8080
          docker run -d --name frontend-test -e PORT=8080 -p 8080:8080 rateengine-frontend:test
          # Wait for it to initialize
          sleep 10
          # Check if it's running
          docker ps | grep frontend-test
          # Stop and cleanup
          docker stop frontend-test
          docker rm frontend-test
